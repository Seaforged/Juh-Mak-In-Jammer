; JJ XR1 Firmware — RadioMaster XR1 (ESP32C3 + LR1121) custom firmware
; Part of the Juh-Mak-In Jammer v3.0 three-emitter architecture.
; Host firmware lives in the repository root; this project runs on the XR1.

[platformio]
default_envs = xr1

[env:xr1]
platform = espressif32
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    jgromes/RadioLib@^7.0.0
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DXR1_FIRMWARE
    -DCORE_DEBUG_LEVEL=3
