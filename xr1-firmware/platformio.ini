; JJ XR1 Firmware — RadioMaster XR1 (ESP32C3 + LR1121) custom firmware
; Part of the Juh-Mak-In Jammer v3.0 three-emitter architecture.
; Host firmware lives in the repository root; this project runs on the XR1.

[platformio]
default_envs = xr1

[env:xr1]
platform = espressif32
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Phase 5 adds the ESP-IDF WiFi + Bluedroid BLE stacks for Remote ID, which
; push the app image past the default 1.3 MB partition. huge_app.csv gives
; a 3 MB app partition at the cost of OTA — acceptable for this device
; since we already have the UART passthrough for updates.
board_build.partitions = huge_app.csv
lib_deps =
    jgromes/RadioLib@^7.0.0
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DXR1_FIRMWARE
    -DCORE_DEBUG_LEVEL=3
