[platformio]
default_envs = t3s3

[env:t3s3]
platform = espressif32
board = lilygo-t3-s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_T3S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DJAMMER_MODE=1
    ; NimBLE-Arduino's CONFIG_BT_NIMBLE_EXT_ADV=1 swaps the legacy
    ; NimBLEAdvertising/Data classes for the Ext* equivalents. On
    ; ESP32-S3 the Ext API + setLegacyAdvertising(true) reports
    ; isAdvertising=true but never actually keys the radio. EXT_ADV is
    ; only required on the SCAN side for Coded PHY reception
    ; (SENTRY-RF). On the TX side we want the proven legacy adv API.
lib_deps =
    jgromes/RadioLib@^7.0.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    h2zero/NimBLE-Arduino@^2.0.0
board_build.partitions = huge_app.csv
