; Temporary T3S3 sketch that bridges USB Serial <-> UART1 (GPIO 43/44) so
; esptool can reach the XR1 LR1121's ESP32C3 ROM bootloader through the
; T3S3 when the CP2102 is no longer wired. One-shot flashing tool — after
; the XR1 is programmed, reflash the real T3S3 firmware from the repo root.
;
; Build:   cd tools/xr1_passthrough && pio run -e xr1_passthrough
; Flash:   pio run -e xr1_passthrough --target upload --upload-port COM6

[platformio]
default_envs = xr1_passthrough

[env:xr1_passthrough]
platform = espressif32
board = lilygo-t3-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DBOARD_T3S3
    -DARDUINO_USB_CDC_ON_BOOT=1
